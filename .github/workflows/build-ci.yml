# This workflow will build a Java project with Gradle

name: Slimefun Builder

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  TZ: 'Asia/Shanghai'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x gradlew
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          java-package: jdk
          architecture: x64
          cache: gradle
      - name: Build Slimefun
        run: ./gradlew build --no-daemon
      - name: Get build artifact filename
        run: |
          FILENAME=$(find build/libs -maxdepth 1 -type f -name "Slimefun-*.jar" ! -name "*-sources.jar" -printf "%f\n")
          [ -n "$FILENAME" ]
          [ "$(printf "%s\n" "$FILENAME" | wc -l)" -eq 1 ]
          echo "SLIMEFUN_ARTIFACT_NAME=$FILENAME" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v7
        name: Upload Beta artifact
        with:
          name: Slimefun Beta Build
          path: build/libs/${{ env.SLIMEFUN_ARTIFACT_NAME }}
